<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login fixture</title>
  <style>
    body { font-family: system-ui, sans-serif; color: #1a1a1a; background: #ffffff; margin: 0; }
    main { padding: 1em; }
    label { display: inline-block; min-width: 8em; }
    button { color: #ffffff; background: #005a9c; border: none; padding: 0.5em 1em; }
  </style>
</head>
<body>
  <main id="main">
    <h1>Sign in</h1>
    <form method="post" action="/login">
      <p>
        <label for="email">Email</label>
        <input id="email" name="email" type="text" autocomplete="username">
      </p>
      <p>
        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password">
      </p>
      <p><button type="submit">Sign in</button></p>
    </form>
  </main>
</body>
</html>
