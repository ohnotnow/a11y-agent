<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Journey fixture — transitions that misbehave</title>
  <style>
    body { font-family: system-ui, sans-serif; color: #1a1a1a; background: #ffffff; margin: 0; padding: 1em; }
    button { color: #ffffff; background: #005a9c; border: none; padding: 0.5em 1em; }
    label { display: block; margin-top: 0.75em; }
    dialog { width: 30em; height: 80vh; padding: 0; }
    dialog form { height: 100%; overflow-y: auto; margin: 0; padding: 1em; box-sizing: border-box; }
    /* Forces the dialog form to scroll internally, so content above the fold can
       end up off-screen — exactly the real-app defect this fixture preserves. */
    .spacer { height: 150vh; }
    .error-slot { color: #b00020; min-height: 1em; }
  </style>
</head>
<body>
  <h1>Journey fixture</h1>

  <!-- Silent update: the results change with NO live region anywhere — a screen
       reader hears nothing when this content appears -->
  <section>
    <button id="load-results">Load results</button>
    <div id="results"></div>
  </section>

  <!-- Native constraint validation: a blocked submit mutates no DOM at all; only
       the read-back's :invalid probe can see what happened -->
  <section>
    <form id="native-form">
      <label>Name <input id="native-name" name="name" required></label>
      <button id="native-submit" type="submit">Save</button>
    </form>
  </section>

  <!-- Modal opens via showModal() and then drops focus to body -->
  <section>
    <button id="open-dialog">New thing</button>
  </section>

  <!-- Pre-rendered and revealed by the `open` attribute flip: invisible to
       childList watching, caught only by the attribute-mutation path -->
  <dialog id="dlg">
    <form id="dlg-form" novalidate>
      <label>Title <input id="dlg-title" name="title"></label>
      <p class="error-slot" aria-live="polite" id="err-title"></p>
      <div class="spacer"></div>
      <label>Owner <input id="dlg-owner" name="owner"></label>
      <p class="error-slot" aria-live="polite" id="err-owner"></p>
      <button id="dlg-submit" type="submit">Create</button>
    </form>
  </dialog>

  <script>
    document.getElementById("load-results").addEventListener("click", () => {
      document.getElementById("results").innerHTML = "<p>3 results found</p>";
    });

    document.getElementById("open-dialog").addEventListener("click", () => {
      const dlg = document.getElementById("dlg");
      dlg.showModal();
      // The defect: something "tidies up" focus after opening, stranding it on body.
      const active = document.activeElement;
      if (active && active.blur) active.blur();
    });

    // Both errors render into their aria-live slots, but the form stays scrolled
    // at the submit button — the title error is above the fold — and focus is
    // not moved anywhere useful.
    document.getElementById("dlg-form").addEventListener("submit", (e) => {
      e.preventDefault();
      document.getElementById("err-title").textContent = "The title has already been taken.";
      document.getElementById("err-owner").textContent = "The owner field is required.";
    });
  </script>
</body>
</html>
