<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Theme fixture</title>
    <style>
      /* Light (default): muted text is #9f9fa9 on white — 2.62:1, fails AA.
         Dark: muted text lightens on a dark ground and comfortably passes.
         So color-contrast fires in light only — the same shape as the real
         Flux unselected-tab quirk that prompted this feature. */
      body {
        background: #ffffff;
        color: #111111;
      }
      .muted {
        color: #9f9fa9;
      }
      @media (prefers-color-scheme: dark) {
        body {
          background: #1a1a1a;
          color: #f5f5f5;
        }
        .muted {
          color: #cfcfcf;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Theme fixture</h1>
      <p class="muted">Low-contrast in light, comfortably readable in dark.</p>
    </main>
  </body>
</html>
