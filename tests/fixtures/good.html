<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Good fixture — accessible page</title>
  <style>
    body { font-family: system-ui, sans-serif; color: #1a1a1a; background: #ffffff; margin: 0; }
    .skip-link { position: absolute; left: -999px; }
    .skip-link:focus { left: 8px; top: 8px; }
    a { color: #0645ad; }
    /* WCAG 2.2 AA target-size (2.5.8): links need a >=24px touch target */
    nav a, footer a { display: inline-block; padding: 0.6em 0.75em; }
    button { color: #ffffff; background: #005a9c; border: none; padding: 0.5em 1em; }
    header, nav, main, footer { padding: 1em; }
    label { display: inline-block; min-width: 8em; }
    [role="tab"][aria-selected="true"] { background: #003b66; }
    [role="tabpanel"] { border: 1px solid #005a9c; padding: 0.5em 1em; }
  </style>
</head>
<body>
  <a class="skip-link" href="#main">Skip to main content</a>
  <header>
    <h1>Departmental Timetable</h1>
  </header>
  <nav aria-label="Main">
    <ul>
      <li><a href="#main">Home</a></li>
      <li><a href="#request">Request a timetable</a></li>
    </ul>
  </nav>
  <main id="main">
    <h2 id="request">Request a timetable</h2>
    <p>Fill in the form below and we will email your timetable to you.</p>
    <form>
      <p>
        <label for="name">Full name</label>
        <input id="name" name="name" type="text" autocomplete="name">
      </p>
      <p>
        <label for="email">Email address</label>
        <input id="email" name="email" type="email" autocomplete="email">
      </p>
      <p><button type="submit">Send request</button></p>
    </form>

    <!-- APG-correct tabs: roving tabindex, arrow keys move focus and select.
         The unselected tab must NOT be reported as unreachable-interactive
         (it earns unreachable-composite-item at minor instead). -->
    <h2>Timetable views</h2>
    <div role="tablist" aria-label="Timetable views">
      <button type="button" role="tab" id="tab-week" aria-selected="true" aria-controls="panel-week">Week</button>
      <button type="button" role="tab" id="tab-month" aria-selected="false" aria-controls="panel-month" tabindex="-1">Month</button>
    </div>
    <div role="tabpanel" id="panel-week" aria-labelledby="tab-week" tabindex="0">
      <p>Your timetable one week at a time.</p>
    </div>
    <div role="tabpanel" id="panel-month" aria-labelledby="tab-month" tabindex="0" hidden>
      <p>Your timetable one month at a time.</p>
    </div>
  </main>
  <footer>
    <p><a href="#main">Back to top</a></p>
  </footer>
  <script>
    const tablist = document.querySelector('[role="tablist"]');
    const tabs = Array.from(tablist.querySelectorAll('[role="tab"]'));
    const select = (tab) => {
      for (const t of tabs) {
        const selected = t === tab;
        t.setAttribute("aria-selected", String(selected));
        t.tabIndex = selected ? 0 : -1;
        document.getElementById(t.getAttribute("aria-controls")).hidden = !selected;
      }
      tab.focus();
    };
    tablist.addEventListener("keydown", (e) => {
      const moves = { ArrowRight: 1, ArrowLeft: -1 };
      if (!(e.key in moves)) return;
      const from = tabs.indexOf(document.activeElement);
      if (from === -1) return;
      e.preventDefault();
      select(tabs[(from + moves[e.key] + tabs.length) % tabs.length]);
    });
    tabs.forEach((tab) => tab.addEventListener("click", () => select(tab)));
  </script>
</body>
</html>
