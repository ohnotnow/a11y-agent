<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Good fixture — accessible page</title>
  <style>
    body { font-family: system-ui, sans-serif; color: #1a1a1a; background: #ffffff; margin: 0; }
    .skip-link { position: absolute; left: -999px; }
    .skip-link:focus { left: 8px; top: 8px; }
    a { color: #0645ad; }
    /* WCAG 2.2 AA target-size (2.5.8): links need a >=24px touch target */
    nav a, footer a { display: inline-block; padding: 0.6em 0.75em; }
    button { color: #ffffff; background: #005a9c; border: none; padding: 0.5em 1em; }
    header, nav, main, footer { padding: 1em; }
    label { display: inline-block; min-width: 8em; }
  </style>
</head>
<body>
  <a class="skip-link" href="#main">Skip to main content</a>
  <header>
    <h1>Departmental Timetable</h1>
  </header>
  <nav aria-label="Main">
    <ul>
      <li><a href="#main">Home</a></li>
      <li><a href="#request">Request a timetable</a></li>
    </ul>
  </nav>
  <main id="main">
    <h2 id="request">Request a timetable</h2>
    <p>Fill in the form below and we will email your timetable to you.</p>
    <form>
      <p>
        <label for="name">Full name</label>
        <input id="name" name="name" type="text" autocomplete="name">
      </p>
      <p>
        <label for="email">Email address</label>
        <input id="email" name="email" type="email" autocomplete="email">
      </p>
      <p><button type="submit">Send request</button></p>
    </form>
  </main>
  <footer>
    <p><a href="#main">Back to top</a></p>
  </footer>
</body>
</html>
